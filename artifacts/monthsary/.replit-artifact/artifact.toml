kind = "web"
previewPath = "/"
title = "Anniversary"
version = "1.0.0"
id = "artifacts/anniversary"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22311

[services.development]
run = "pnpm --filter @workspace/anniversary run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anniversary", "run", "build" ]
publicDir = "artifacts/anniversary/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22311"
BASE_PATH = "/"
